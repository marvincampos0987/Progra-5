<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/categorias"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ esEdicion ? 'Editar' : 'Nueva' }} Categoría</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="guardar()">
    <ion-item>
      <ion-input label="Nombre Categoría" labelPlacement="stacked" formControlName="nombreCategoria"></ion-input>
    </ion-item>
    <ion-item>
      <ion-toggle formControlName="activo">Activo</ion-toggle>
    </ion-item>
    <ion-button expand="block" type="submit" [disabled]="form.invalid">Guardar</ion-button>
  </form>
</ion-content>
