<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/clientes"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ esEdicion ? 'Editar' : 'Nuevo' }} Cliente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="guardar()">
    <ion-item>
      <ion-input label="Nombre" labelPlacement="stacked" formControlName="nombre"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Email" labelPlacement="stacked" type="email" formControlName="email"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Teléfono" labelPlacement="stacked" formControlName="telefono"></ion-input>
    </ion-item>
    <ion-item>
      <ion-select label="Tipo Cédula" labelPlacement="stacked" formControlName="tipoCedula">
        <ion-select-option *ngFor="let t of tiposCedula" [value]="t.tipoCedula1">{{ t.descripcion }}</ion-select-option>
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-toggle formControlName="activo">Activo</ion-toggle>
    </ion-item>
    <ion-button expand="block" type="submit" [disabled]="form.invalid">Guardar</ion-button>
  </form>
</ion-content>
