<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Pedidos</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="nuevo()">
        <ion-icon name="add"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-item *ngFor="let p of pedidos">
      <ion-label>
        <h2>Pedido #{{ p.pedidoId }}</h2>
        <p>Cliente: {{ p.clienteId }} | Total: {{ p.total }} {{ p.moneda }}</p>
      </ion-label>
      <ion-button fill="clear" (click)="editar(p.pedidoId)">
        <ion-icon name="create"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="danger" (click)="eliminar(p.pedidoId)">
        <ion-icon name="trash"></ion-icon>
      </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
