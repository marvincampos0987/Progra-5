<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/pedidos"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ esEdicion ? 'Editar' : 'Nuevo' }} Pedido</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="guardar()">
    <ion-item>
      <ion-select label="Cliente" labelPlacement="stacked" formControlName="clienteId">
        <ion-select-option *ngFor="let c of clientes" [value]="c.clienteId">{{ c.nombre }}</ion-select-option>
      </ion-select>
    </ion-item>
    <ion-item>
      <ion-input label="Total" labelPlacement="stacked" type="number" formControlName="total"></ion-input>
    </ion-item>
    <ion-item>
      <ion-input label="Moneda" labelPlacement="stacked" formControlName="moneda"></ion-input>
    </ion-item>
    <ion-button expand="block" type="submit" [disabled]="form.invalid">Guardar</ion-button>
  </form>
</ion-content>
