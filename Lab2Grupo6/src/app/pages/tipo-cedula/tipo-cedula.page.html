<ion-header>

  <ion-toolbar color="primary">

    <ion-buttons slot="start">

      <ion-back-button defaultHref="/home"></ion-back-button>

    </ion-buttons>

    <ion-title>Tipo Cédula</ion-title>

    <ion-buttons slot="end">

      <ion-button (click)="nuevo()">

        <ion-icon name="add"></ion-icon>

      </ion-button>

    </ion-buttons>

  </ion-toolbar>

</ion-header>



<ion-content class="ion-padding">

  <ion-list>

    <ion-item *ngFor="let t of tiposCedula">

      <ion-label>

        <h2>{{ t.descripcion }}</h2>

      </ion-label>

      <ion-button fill="clear" (click)="editar(t.tipoCedula1)">
        <ion-icon name="create"></ion-icon>
      </ion-button>
      <ion-button fill="clear" color="danger" (click)="eliminar(t.tipoCedula1)">

        <ion-icon name="trash"></ion-icon>

      </ion-button>

    </ion-item>

  </ion-list>

</ion-content>
